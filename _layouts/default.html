<!doctype html>
<html lang="{{ site.lang | default: 'zh-Hant' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav class="nav" aria-label="Primary navigation">
        <a href="{{ '/' | relative_url }}">首頁</a>
        <a href="{{ '/about/' | relative_url }}">關於</a>
        {% for category in site.data.categories %}
          <a href="{{ category.url | relative_url }}">{{ category.name }}</a>
        {% endfor %}
      </nav>
    </header>

    <main>
      {{ content }}
    </main>

    <footer class="site-footer">
      <p>{{ site.description }}</p>
      <p>Built for GitHub Pages.</p>
    </footer>
  </body>
</html>
